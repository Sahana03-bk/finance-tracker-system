{% extends "base.html" %}

{% block title %}Login - Finance Tracker{% endblock %}

{% block content %}

<div class="login-wrapper">
    <div class="login-card">

        <div class="login-header">
            <span class="login-badge">Secure Access</span>
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to access your Finance Tracker dashboard</p>
        </div>

        {% if error %}
            <div class="alert error-alert">
                {{ error }}
            </div>
        {% endif %}

        {% if success %}
            <div class="alert success-alert">
                {{ success }}
            </div>
        {% endif %}

        <form method="post" action="/login-page" class="form-container">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn primary-btn full-btn">Login to Dashboard</button>
        </form>

        <div class="helper-links">
            <a href="/">← Back to Home</a>
        </div>

    </div>
</div>

{% endblock %}
